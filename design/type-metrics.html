<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-sans); }
  .nav { width: 190px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; }
  .brand { padding: 4px 10px 16px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .brand-name { font-size: 18px; font-weight: 800; letter-spacing: .1em; color: #e8eaee; }
  .brand-sub { font-size: 10px; color: #5a5f6b; letter-spacing: .04em; text-transform: uppercase; }
  .nav-group-title { font-size: 10px; font-weight: 600; color: #5a5f6b; text-transform: uppercase; letter-spacing: .08em; padding: 12px 10px 4px; }
  .nav-item { display: block; padding: 5px 10px; font-size: 12px; color: #8b909a; text-decoration: none; border-radius: 6px; cursor: pointer; }
  .nav-item:hover { color: #e8eaee; background: #22252e; }
  .nav-item.active { color: #00c4aa; background: rgba(0,196,170,.1); }
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">
      <div class="brand-name">ONYX</div>
      <div class="brand-sub">AI Sales Force</div>
    </div>
    <a class="nav-item active">Home</a>
    <div class="nav-group-title">Partner dashboard</div>
    <a class="nav-item">Intelligence</a>
    <a class="nav-item">Pre-call brief</a>
    <a class="nav-item">Call queue</a>
    <div class="nav-group-title">AI workspace</div>
    <a class="nav-item">Post-call</a>
    <a class="nav-item">During-call assist</a>
    <div class="nav-group-title">Data</div>
    <a class="nav-item">Partners</a>
    <a class="nav-item">Orders</a>
  </div>
</body>
</html>
