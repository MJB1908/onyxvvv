<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-sans); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .swatch { width: 72px; }
  .swatch-box { height: 48px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); }
  .swatch-name { font-size: 10px; color: var(--fg-muted); margin-top: 5px; }
  .swatch-val  { font-size: 10px; color: var(--fg-secondary); font-family: var(--font-mono); }
  .label { font-size: 10px; font-weight: 600; color: var(--fg-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="label">Backgrounds</div>
  <div class="row">
    <div class="swatch"><div class="swatch-box" style="background:#12141a"></div><div class="swatch-name">bg-base</div><div class="swatch-val">#12141a</div></div>
    <div class="swatch"><div class="swatch-box" style="background:#1a1d24"></div><div class="swatch-name">bg-surface</div><div class="swatch-val">#1a1d24</div></div>
    <div class="swatch"><div class="swatch-box" style="background:#22252e"></div><div class="swatch-name">bg-raised</div><div class="swatch-val">#22252e</div></div>
    <div class="swatch"><div class="swatch-box" style="background:#2a2d36"></div><div class="swatch-name">border</div><div class="swatch-val">#2a2d36</div></div>
  </div>
  <div class="label">Foreground</div>
  <div class="row">
    <div class="swatch"><div class="swatch-box" style="background:#e8eaee"></div><div class="swatch-name">fg-primary</div><div class="swatch-val">#e8eaee</div></div>
    <div class="swatch"><div class="swatch-box" style="background:#8b909a"></div><div class="swatch-name">fg-secondary</div><div class="swatch-val">#8b909a</div></div>
    <div class="swatch"><div class="swatch-box" style="background:#5a5f6b"></div><div class="swatch-name">fg-muted</div><div class="swatch-val">#5a5f6b</div></div>
  </div>
</body>
</html>
