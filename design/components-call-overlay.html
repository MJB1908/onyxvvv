<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-sans); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; }
  .tier { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; background: var(--bg-surface); border: 1px solid var(--border); }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 4px; }
  .tier-name { font-size: 12px; color: var(--fg-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="tier">
      <span class="badge" style="background:#2a2040;color:#c8a8f0">Platinum</span>
      <span class="tier-name">#c8a8f0 / #2a2040</span>
    </div>
    <div class="tier">
      <span class="badge" style="background:#2d2410;color:#f0c060">Gold</span>
      <span class="tier-name">#f0c060 / #2d2410</span>
    </div>
    <div class="tier">
      <span class="badge" style="background:#1e2228;color:#a0b0c0">Silver</span>
      <span class="tier-name">#a0b0c0 / #1e2228</span>
    </div>
    <div class="tier">
      <span class="badge" style="background:#1a2a1a;color:#70c070">Auth.</span>
      <span class="tier-name">#70c070 / #1a2a1a</span>
    </div>
  </div>
</body>
</html>
