<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-sans); }
  .call-card {
    background: #1a1d24; border: 1px solid #2a2d36;
    border-radius: 12px; width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(0,200,170,.15);
    overflow: hidden;
  }
  .topbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px 6px; background: #12141a; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf82; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.3)} }
  .call-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing:.5px; color: #4caf82; flex:1; }
  .dismiss { background: none; border: none; color: #5a5f6b; font-size: 14px; cursor: pointer; }
  .number { padding: 8px 14px 4px; font-size: 20px; font-weight: 700; color: #e8eaee; letter-spacing:.5px; }
  .partner-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px 6px; border-top: 1px solid #2a2d36; }
  .avatar { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg,#00c4aa,#0097c7); display:flex;align-items:center;justify-content:center; font-weight:700;font-size:14px;color:#fff;flex-shrink:0; }
  .pname { font-size: 14px; font-weight: 600; color: #e8eaee; }
  .pmeta { font-size: 11px; color: #8b909a; margin-top: 1px; }
  .tier { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: #2d2410; color: #f0c060; }
  .actions { display: flex; gap: 6px; padding: 10px 14px 12px; }
  .btn { padding: 7px 12px; border: none; border-radius: 6px; font: 600 11px var(--font-sans); cursor: pointer; transition: opacity .15s; }
  .btn-p { background: linear-gradient(135deg,#00c4aa,#0097c7); color:#fff; flex:1; }
  .btn-s { background: #2a2d36; color: #c8cdd6; flex:1; }
  .btn-g { background: transparent; color: #5a5f6b; border: 1px solid #2a2d36; }
</style>
</head>
<body>
  <div class="call-card">
    <div class="topbar">
      <span class="dot"></span>
      <span class="call-label">Inbound Call</span>
      <button class="dismiss">✕</button>
    </div>
    <div class="number">+49 89 1234567</div>
    <div class="partner-row">
      <div class="avatar">TG</div>
      <div style="flex:1;min-width:0">
        <div class="pname">TechGroup GmbH</div>
        <div class="pmeta">Hans Müller · hans@techgroup.de</div>
      </div>
      <span class="tier">Gold</span>
    </div>
    <div class="actions">
      <button class="btn btn-p">Open Partner</button>
      <button class="btn btn-s">+ Note</button>
      <button class="btn btn-g">Dismiss</button>
    </div>
  </div>
</body>
</html>
