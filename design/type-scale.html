<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg-base); padding: 20px; font-family: var(--font-sans); display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .lbl { font-size: 10px; font-weight: 600; color: var(--fg-muted); text-transform: uppercase; letter-spacing:.06em; margin-bottom: 10px; }
  /* Shadows */
  .shadow-demo { width: 100px; height: 60px; background: #1a1d24; border: 1px solid #2a2d36; border-radius: 12px; display:flex;align-items:center;justify-content:center;font-size:10px;color:#5a5f6b; }
  .shadow-demo.card-s { box-shadow: 0 8px 32px rgba(0,0,0,.6); }
  .shadow-demo.overlay-s { box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(0,200,170,.15); }
  .shadow-demo.sm-s { box-shadow: 0 2px 8px rgba(0,0,0,.4); }
  /* Progress bars */
  .progress-section { }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bar-track { flex:1; height: 6px; background: #2a2d36; border-radius: 3px; width: 140px; }
  .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(135deg,#00c4aa,#0097c7); }
  .bar-lbl { font-size: 11px; color: #8b909a; width: 80px; }
  .bar-pct { font-size: 11px; color: #e8eaee; font-weight: 600; width: 32px; text-align: right; }
</style>
</head>
<body>
  <div>
    <div class="lbl">Shadow scale</div>
    <div style="display:flex;gap:12px">
      <div>
        <div class="shadow-demo sm-s">sm</div>
        <div style="font-size:9px;color:#5a5f6b;margin-top:6px;text-align:center">shadow-sm</div>
      </div>
      <div>
        <div class="shadow-demo card-s">card</div>
        <div style="font-size:9px;color:#5a5f6b;margin-top:6px;text-align:center">shadow-card</div>
      </div>
      <div>
        <div class="shadow-demo overlay-s">overlay</div>
        <div style="font-size:9px;color:#5a5f6b;margin-top:6px;text-align:center">shadow-overlay</div>
      </div>
    </div>
  </div>
  <div class="progress-section">
    <div class="lbl">Progress bars</div>
    <div class="bar-row"><span class="bar-lbl">Enterprise</span><div class="bar-track"><div class="bar-fill" style="width:62%"></div></div><span class="bar-pct">62%</span></div>
    <div class="bar-row"><span class="bar-lbl">PRO</span><div class="bar-track"><div class="bar-fill" style="width:28%"></div></div><span class="bar-pct">28%</span></div>
    <div class="bar-row"><span class="bar-lbl">Basic</span><div class="bar-track"><div class="bar-fill" style="width:10%"></div></div><span class="bar-pct">10%</span></div>
  </div>
</body>
</html>
