<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ONYX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; width:320px; padding:24px; background:#f7f8fa; color:#1a1d23; }
.logo-row { display:flex; align-items:center; gap:10px; margin-bottom:24px; }
.logo { width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,#0077b6,#00a8e8); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; color:#fff; }
.brand { font-size:20px; font-weight:700; letter-spacing:.5px; }
.status-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:#fff; border:1px solid #e1e4e8; border-radius:10px; margin-bottom:10px; }
.status-label { font-size:13px; font-weight:600; }
.status-sub { font-size:10px; color:#9ba3ae; margin-top:2px; }
.dot { width:14px; height:14px; border-radius:50%; background:#cdd0d6; flex-shrink:0; transition:background .3s; }
.dot.green { background:#2d9e5f; box-shadow:0 0 6px #2d9e5f40; }
.dot.red { background:#dc3545; box-shadow:0 0 6px #dc354540; }
.dot.checking { background:#e67e00; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.btn-row { display:flex; gap:8px; margin-top:18px; }
.action-btn {
  flex:1; padding:12px; font-size:13px; font-weight:700; font-family:inherit;
  border:none; border-radius:10px; cursor:pointer; transition:opacity .15s,transform .1s; letter-spacing:.3px;
}
.action-btn:hover { opacity:.9; }
.action-btn:active { transform:scale(.98); }
.action-btn:disabled { background:#cdd0d6; cursor:not-allowed; transform:none; color:#9ba3ae; }
.btn-get { background:linear-gradient(135deg,#0077b6,#00a8e8); color:#fff; }
.btn-open { background:linear-gradient(135deg,#141c28,#1a2332); color:#e8edf4; border:1px solid #2d3a4d; }
.btn-open:hover { border-color:#3d8bfd; color:#5c9dff; }
.progress { margin-top:10px; font-size:11px; color:#5a6270; text-align:center; min-height:16px; }
.progress.error { color:#dc3545; }
.progress.success { color:#2d9e5f; font-weight:600; }
</style>
</head>
<body>
<div class="logo-row">
  <div class="logo">O</div>
  <div class="brand">ONYX</div>
</div>
<div class="status-row">
  <div><div class="status-label">ERP Connection</div><div class="status-sub" id="erpSub">Checking…</div></div>
  <div class="dot checking" id="erpDot"></div>
</div>
<div class="status-row">
  <div><div class="status-label">ONYX Server</div><div class="status-sub" id="onyxSub">Checking…</div></div>
  <div class="dot checking" id="onyxDot"></div>
</div>
<div class="btn-row">
  <button class="action-btn btn-get" id="getDataBtn" disabled>Get Data</button>
  <button class="action-btn btn-open" id="openBtn">Open ONYX</button>
</div>
<div class="progress" id="progress"></div>
<script src="dashboard.js"></script>
</body>
</html>
