<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3CX PRM</title>
<style>
  :root { --bg:#1a1d23; --s:#23262e; --b:#33373f; --a:#00b8a0; --a2:#0097c7; --t:#e4e6ea; --m:#8b909a; --r:6px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { width:300px; background:var(--bg); color:var(--t); font:13px 'Segoe UI',system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--s); border-bottom:1px solid var(--b); }
  .logo { width:26px;height:26px;border-radius:5px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0; }
  h1 { font-size:13px;font-weight:600;flex:1; }
  #dot { width:8px;height:8px;border-radius:50%;background:#555;transition:background .3s; }
  #bar { display:none;padding:5px 14px;font-size:11px;line-height:1.5;border-bottom:1px solid var(--b); }
  #bar a { color:inherit; }
  .btn-dashboard { display:flex;align-items:center;justify-content:center;gap:8px;margin:14px;padding:10px;background:linear-gradient(135deg,var(--a),var(--a2));border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none;width:calc(100% - 28px);transition:opacity .15s; }
  .btn-dashboard:hover { opacity:.9; }
  hr { border:none;border-top:1px solid var(--b); }
  .quick { padding:10px 14px; }
  .ql { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--m);margin-bottom:8px; }
  .field { display:flex;flex-direction:column;gap:3px;margin-bottom:7px; }
  label { font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--m); }
  input,select,textarea { background:var(--s);border:1px solid var(--b);border-radius:var(--r);color:var(--t);font:12px 'Segoe UI',system-ui,sans-serif;padding:5px 8px;outline:none;width:100%;transition:border-color .15s; }
  input:focus,select:focus,textarea:focus { border-color:var(--a); }
  textarea { resize:vertical;min-height:60px; }
  .row2 { display:flex;gap:8px; }
  .row2 .field { flex:1; }
  .actions { display:flex;gap:8px;padding:0 14px 12px;justify-content:flex-end; }
  button.post { padding:7px 16px;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border:none;border-radius:var(--r);font:600 12px 'Segoe UI',system-ui,sans-serif;cursor:pointer; }
  button.post:disabled { opacity:.45;cursor:not-allowed; }
  button.clr { padding:7px 12px;background:var(--b);color:var(--m);border:none;border-radius:var(--r);font:600 12px 'Segoe UI',system-ui,sans-serif;cursor:pointer; }
  #status { padding:5px 14px;font-size:11px;min-height:24px;display:flex;align-items:center;gap:6px; }
  .idle{color:var(--m)}.busy{color:var(--a2)}.ok{color:#2d9e5f}.err{color:#dc3545}
  .spinner{width:11px;height:11px;border:2px solid var(--b);border-top-color:var(--a2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="logo">3</div>
  <h1>Partner PRM</h1>
  <div id="dot" title="Checking session…"></div>
</header>
<div id="bar"></div>
<button class="btn-dashboard" id="btnDash">Open Dashboard ↗</button>
<hr>
<div class="quick">
  <div class="ql">Quick Note</div>
  <div class="field"><label>Partner ID</label><input id="pid" placeholder="35424" /></div>
  <div class="row2">
    <div class="field"><label>Type</label>
      <select id="ntype">
        <option value="0">Contact</option><option value="1">Support</option>
        <option value="2" selected>Call</option><option value="3">Project</option>
        <option value="4">Commitments</option><option value="5">Email</option>
      </select>
    </div>
    <div class="field"><label>Subject</label><input id="subj" placeholder="Subject…" /></div>
  </div>
  <div class="field"><label>Body</label><textarea id="nbody" placeholder="Note body…"></textarea></div>
</div>
<div id="status" class="idle">Ready</div>
<div class="actions">
  <button class="clr" id="btnClr">Clear</button>
  <button class="post" id="btnPost">Post →</button>
</div>
<script src="popup.js"></script>
</body>
</html>
