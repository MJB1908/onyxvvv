<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYX Admin - Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .setting-group {
      margin-bottom: 30px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    select,
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    select:focus,
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 12px;
      border-radius: 4px;
      font-size: 13px;
      color: #555;
      margin-top: 8px;
      line-height: 1.5;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-save:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-save:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-reset {
      background: #f0f0f0;
      color: #333;
    }

    .btn-reset:hover {
      background: #e0e0e0;
    }

    .status {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
      font-size: 13px;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status.loading {
      background: #e2e3e5;
      color: #383d41;
      border: 1px solid #d6d8db;
    }

    .current-model {
      display: inline-block;
      background: #e8f0fe;
      color: #1967d2;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ ONYX Settings</h1>
    <p class="subtitle">Configure your AI Sales Force Assistant</p>

    <div id="status" class="status"></div>

    <form id="settingsForm">
      <div class="setting-group">
        <label for="modelSelect">
          OpenAI Model
          <span id="currentModel" class="current-model"></span>
        </label>
        <select id="modelSelect" required>
          <option value="">Loading models...</option>
        </select>
        <div class="info-box">
          Different models offer different trade-offs between speed, cost, and quality. Changes apply immediately to new chat requests.
        </div>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-save" id="saveBtn">Save Settings</button>
        <button type="button" class="btn-reset" onclick="location.reload()">Reset</button>
      </div>
    </form>
  </div>

  <script>
    const API_BASE = "/api";

    function showStatus(message, type) {
      const el = document.getElementById("status");
      el.textContent = message;
      el.className = `status show ${type}`;
    }

    async function loadSettings() {
      try {
        showStatus("Loading settings...", "loading");
        const res = await fetch(`${API_BASE}/admin/settings`);
        if (!res.ok) throw new Error("Failed to load settings");

        const data = await res.json();
        const { current, available } = data;

        // Populate model dropdown
        const select = document.getElementById("modelSelect");
        select.innerHTML = available.models
          .map((m) => `<option value="${m.id}">${m.name}</option>`)
          .join("");
        select.value = current.openaiModel;

        // Display current model
        document.getElementById("currentModel").textContent = `Currently: ${current.openaiModel}`;

        showStatus("Settings loaded successfully", "success");
        setTimeout(() => {
          document.getElementById("status").className = "status";
        }, 2000);
      } catch (err) {
        showStatus(`Error: ${err.message}`, "error");
      }
    }

    document.getElementById("settingsForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const model = document.getElementById("modelSelect").value;

      if (!model) {
        showStatus("Please select a model", "error");
        return;
      }

      try {
        const btn = document.getElementById("saveBtn");
        btn.disabled = true;
        showStatus("Saving settings...", "loading");

        const res = await fetch(`${API_BASE}/admin/settings`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ openaiModel: model }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Failed to save settings");
        }

        const data = await res.json();
        document.getElementById("currentModel").textContent = `Currently: ${data.settings.openaiModel}`;
        showStatus("✓ Settings saved successfully!", "success");

        btn.disabled = false;
      } catch (err) {
        showStatus(`Error: ${err.message}`, "error");
        document.getElementById("saveBtn").disabled = false;
      }
    });

    // Load on page load
    document.addEventListener("DOMContentLoaded", loadSettings);
  </script>
</body>
</html>
