<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ONYX — Reseller dashboard</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
:root {
  --bg:#f5f6f8; --s:#ffffff; --s2:#f0f2f5; --b:#e1e4e8; --b2:#cdd0d6;
  --a:#0077b6; --a2:#0096c7; --t:#1a1d23; --m:#5a6270; --dim:#9ba3ae;
  --r:8px; --r2:12px;
  --green:#2d9e5f; --red:#dc3545; --amber:#e67e00; --blue:#0077b6; --purple:#6f42c1;
  --font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font:13px var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;background:var(--s);border-bottom:1px solid var(--b);flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.topbar .logo{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;letter-spacing:.04em;}
.topbar h1{font-size:14px;font-weight:600;}
.topbar .divider{width:1px;height:20px;background:var(--b);}
.topbar .who{font-size:12px;color:var(--m);}
.topbar .who strong{color:var(--t);}
.topbar .sp{flex:1;}
.topbar .pill{font-size:11px;padding:3px 9px;border-radius:4px;background:var(--s2);color:var(--m);border:1px solid var(--b);text-decoration:none;}
.topbar a.pill:hover{color:var(--a);border-color:var(--a);}
.topbar #lastSync{font-size:11px;color:var(--dim);}
.topbar-badge{font-size:11px;padding:3px 8px;border-radius:4px;background:#fff3e0;color:var(--amber);border:1px solid #ffd08a;}
.topbar #btnRefreshAll{cursor:pointer;background:transparent;}
.topbar #btnRefreshAll:disabled{opacity:.5;cursor:not-allowed;}

.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:300px;flex-shrink:0;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}

.sidebar-header{padding:12px 14px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);display:flex;align-items:center;}
.sidebar-header .count{margin-left:auto;color:var(--t);font-weight:600;}
.sidebar-filter{padding:0 10px 10px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--b);}
.sidebar-filter input{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);font:12px var(--font);padding:6px 10px;outline:none;}
.sidebar-filter input:focus{border-color:var(--a);}
.chip-group{display:flex;flex-direction:column;gap:5px;}
.chip-group-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);padding-left:2px;}
.chip-row{display:flex;flex-wrap:wrap;gap:4px;}
.chip{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--s2);color:var(--m);border:1px solid var(--b);cursor:pointer;user-select:none;white-space:nowrap;}
.chip:hover{color:var(--t);border-color:var(--a2);}
.chip.active{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border-color:transparent;}
.chip .count{font-size:9px;opacity:.7;margin-left:3px;}

.partner-list{flex:1;overflow-y:auto;}
.pitem{padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--b);}
.pitem:hover{background:var(--s2);}
.pitem.active{background:var(--s2);border-left:2px solid var(--a);padding-left:12px;}
.pitem-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pitem-meta{font-size:10px;color:var(--dim);margin-top:2px;}

.empty{padding:32px;text-align:center;color:var(--dim);font-size:13px;}
.empty strong{color:var(--m);display:block;margin-bottom:4px;font-weight:600;}
.empty code{background:var(--s2);padding:1px 5px;border-radius:3px;font-size:11px;}

.p-header{padding:14px 20px;background:var(--s);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:16px;flex-shrink:0;}
.p-avatar{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0;}
.p-info{flex:1;min-width:0;}
.p-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-sub{font-size:12px;color:var(--m);margin-top:2px;}
.tier-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;flex-shrink:0;}
.tier-titanium,.tier-platinum{background:#f0ebff;color:#6f42c1;border:1px solid #d4b8ff;}
.tier-gold{background:#fff8e1;color:#996500;border:1px solid #ffd54f;}
.tier-silver{background:#f0f4f8;color:#4a6785;border:1px solid #b0c4d8;}
.tier-bronze{background:#fbe9e0;color:#8b4a2b;border:1px solid #e8b894;}
.tier-default{background:var(--s2);color:var(--m);border:1px solid var(--b);}

.pills-row{display:flex;gap:6px;padding:8px 20px;background:var(--s2);border-bottom:1px solid var(--b);flex-shrink:0;overflow-x:auto;}
.spill{font-size:11px;padding:3px 9px;border-radius:4px;white-space:nowrap;background:var(--s);color:var(--m);border:1px solid var(--b);}
.spill strong{color:var(--t);margin-left:4px;}

.tabs{display:flex;background:var(--s);border-bottom:1px solid var(--b);flex-shrink:0;}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;}
.tab:hover{color:var(--t);}
.tab.active{color:var(--a);border-bottom-color:var(--a);}

.tab-content{flex:1;overflow-y:auto;padding:18px 20px;}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;}
.card h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:10px;}
.card .kv{display:grid;grid-template-columns:140px 1fr;gap:6px 12px;font-size:13px;}
.card .kv dt{color:var(--m);}
.card .kv dd{color:var(--t);}

.placeholder{padding:30px;text-align:center;color:var(--dim);font-size:12px;background:var(--s);border:1px dashed var(--b);border-radius:var(--r);}
.placeholder strong{display:block;color:var(--m);margin-bottom:4px;font-size:13px;}

.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{text-align:left;font-weight:600;color:var(--dim);text-transform:uppercase;font-size:10px;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--b);}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--s2);color:var(--t);vertical-align:top;}
.data-table tr:hover td{background:var(--s2);}
.data-table code{background:var(--s2);padding:1px 5px;border-radius:3px;font-size:11px;font-family:'SF Mono',Monaco,Consolas,monospace;}
.data-table a{color:var(--a);text-decoration:none;}
.data-table a:hover{text-decoration:underline;}

.notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.note{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:10px 12px;}
.note-head{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);margin-bottom:5px;}
.note-head .source{padding:1px 6px;border-radius:3px;background:var(--s2);font-weight:600;color:var(--m);font-size:10px;letter-spacing:.04em;}
.note-head .source-erp{background:#fff8e1;color:#996500;border:1px solid #ffd54f;}
.note-head .source-onyx,.note-head .source-onyx-web,.note-head .source-extension{background:#e3f2fd;color:#0077b6;border:1px solid #90caf9;}

.detail-toolbar{display:flex;align-items:center;gap:10px;justify-content:flex-end;margin-bottom:10px;font-size:11px;color:var(--dim);}
.detail-toolbar .btn{padding:5px 10px;font-size:11px;}
.note-subj{font-size:13px;font-weight:600;color:var(--t);margin-bottom:3px;}
.note-body{font-size:12px;color:var(--m);white-space:pre-wrap;}

.note-form{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:14px;}
.note-form h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:10px;}
.note-form label{display:block;font-size:10px;color:var(--m);margin:6px 0 3px;text-transform:uppercase;letter-spacing:.04em;}
.note-form input, .note-form textarea, .note-form select{
  width:100%;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);
  font:13px var(--font);padding:6px 10px;outline:none;
}
.note-form textarea{resize:vertical;min-height:64px;}
.note-form input:focus, .note-form textarea:focus, .note-form select:focus{border-color:var(--a);}
.note-form .row{display:flex;gap:8px;}
.note-form .row > *{flex:1;}
.note-form .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;align-items:center;}
.note-form .status{font-size:11px;color:var(--dim);margin-right:auto;}
.note-form .status.ok{color:var(--green);}
.note-form .status.warn{color:var(--amber);}
.note-form .status.err{color:var(--red);}
.btn{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border:none;padding:7px 14px;border-radius:6px;font:600 12px var(--font);cursor:pointer;}
.btn:hover{opacity:.92;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{background:var(--s2);color:var(--m);border:1px solid var(--b);}
.btn-secondary:hover{color:var(--t);}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--dim);border-top-color:var(--a);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">ONYX</div>
  <h1>Reseller dashboard</h1>
  <div class="divider"></div>
  <div class="who" id="who">…</div>
  <div class="sp"></div>
  <span id="staleBadge" class="topbar-badge" hidden></span>
  <span id="lastSync"></span>
  <button id="btnRefreshAll" class="pill" title="Re-fetch ERP detail for every reseller (slow — 5–15s each)">Refresh all</button>
  <a href="/" class="pill" title="Switch to ONYX (mock data + AI chat)">ONYX home →</a>
</div>

<div class="layout">

  <div class="sidebar">
    <div class="sidebar-header">
      <span>Resellers</span>
      <span class="count" id="resellerCount">0</span>
    </div>
    <div class="sidebar-filter">
      <input type="text" id="sidebarSearch" placeholder="Search resellers…" autocomplete="off">
      <div class="chip-group">
        <div class="chip-group-label">Level</div>
        <div class="chip-row" id="levelChips"></div>
      </div>
    </div>
    <div class="partner-list" id="partnerList">
      <div class="empty"><span class="spinner"></span>Loading…</div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="empty" style="margin:auto">
      <strong>Pick a reseller from the left</strong>
      Or hit “Refresh my data from ERP” in the extension popup if the list is empty.
    </div>
  </div>

</div>

<div class="insight-bar" id="insightBar" hidden>
  <div class="insight-head">
    <span class="insight-label">✦ Insight</span>
    <span class="insight-meta" id="insightMeta"></span>
    <div class="insight-actions">
      <button id="btnInsight" class="btn">Generate</button>
      <button id="btnInsightClear" class="btn-secondary btn" hidden>Clear</button>
    </div>
  </div>
  <div class="insight-body" id="insightBody"></div>
</div>

<style>
.insight-bar{
  background:linear-gradient(0deg,#eaf2fa,#fff);
  border-top:1px solid var(--b);
  padding:10px 20px 12px;
  flex-shrink:0;
  max-height:240px;
  overflow-y:auto;
}
.insight-head{display:flex;align-items:center;gap:10px;}
.insight-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--a);}
.insight-meta{font-size:11px;color:var(--dim);flex:1;}
.insight-actions{display:flex;gap:6px;}
.insight-actions .btn{padding:5px 12px;font-size:11px;}
.insight-actions .btn-secondary{padding:5px 12px;font-size:11px;}
.insight-body{font-size:12px;color:var(--t);line-height:1.6;margin-top:8px;white-space:pre-wrap;}
.insight-body:empty{display:none;}
.insight-body .placeholder{padding:8px;background:transparent;border:0;color:var(--dim);font-style:italic;text-align:left;}
</style>

<script src="/erp.js"></script>
</body>
</html>
