<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ONYX — AI Sales Force Assistant</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="Main navigation">
        <div class="brand">
          <a href="#/home" class="brand-link">ONYX</a>
          <span class="brand-sub">AI Sales Force Assistant</span>
        </div>
        <nav class="nav">
          <a href="#/home" class="nav-item" data-match="home">Home</a>

          <div class="nav-group">
            <div class="nav-group-title">Partner dashboard</div>
            <a href="#/dashboard/insights" class="nav-item nav-item-sub" data-match="dashboard/insights">Intelligence</a>
            <a href="#/dashboard/pre-call" class="nav-item nav-item-sub" data-match="dashboard/pre-call">Pre-call brief</a>
            <a href="#/dashboard/next-caller" class="nav-item nav-item-sub" data-match="dashboard/next-caller">Call queue</a>
            <a href="#/dashboard/prospects" class="nav-item nav-item-sub" data-match="dashboard/prospects">Prospects</a>
          </div>

          <div class="nav-group">
            <div class="nav-group-title">AI workspace</div>
            <a href="#/dashboard/post-call" class="nav-item nav-item-sub" data-match="dashboard/post-call">Post-call</a>
            <a href="#/chat" class="nav-item nav-item-sub nav-item-chat-lite" data-match="chat">During-call assist</a>
          </div>

          <div class="nav-group">
            <div class="nav-group-title">Data</div>
            <a href="#/data/partners" class="nav-item nav-item-sub" data-match="data/partners">Partners</a>
            <a href="#/data/orders" class="nav-item nav-item-sub" data-match="data/orders">Orders</a>
            <a href="#/data/keys" class="nav-item nav-item-sub" data-match="data/keys">Keys</a>
            <a href="#/data/license-types" class="nav-item nav-item-sub" data-match="data/license-types">License types</a>
            <a href="#/data/emails" class="nav-item nav-item-sub" data-match="data/emails">Emails</a>
            <a href="#/data/users" class="nav-item nav-item-sub" data-match="data/users">Internal users</a>
            <a href="#/data/products" class="nav-item nav-item-sub" data-match="data/products">Products</a>
          </div>
        </nav>
      </aside>

      <div class="main-column">
        <header class="topbar">
          <h1 class="topbar-title" id="page-title">Home</h1>
          <div class="topbar-actions">
            <div id="partner-select-wrap" class="partner-select-wrap" hidden>
              <label class="seller-label" for="partner-select">Partner</label>
              <select id="partner-select" class="seller-select" aria-label="Selected partner"></select>
            </div>
            <label class="seller-label" for="seller-select">Seller</label>
            <select id="seller-select" class="seller-select" aria-label="Selected sales rep"></select>
          </div>
        </header>

        <main class="content" id="view" tabindex="-1"></main>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
